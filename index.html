<style>
 :root{--cyan:#29ABE2;--red:#E23B3B;--green:#22B24C;--orange:#F5A100;--mut:#9a9a9a}
 *{box-sizing:border-box;margin:0}
 body{font-family:system-ui,'Segoe UI',sans-serif;background:#f2f2f2;color:#222;padding-bottom:30px}
 header{background:#3a3a3a;color:#fff;padding:12px;display:flex;align-items:center;justify-content:space-between}
 header b{color:var(--cyan);font-size:17px}
 header button{background:#555;color:#fff;border:0;border-radius:6px;padding:6px 14px;font-size:16px}
 section{margin:10px;background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
 h2{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
 .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;font-size:14px;gap:8px}
 .row:last-child{border:0}
 .bar{height:6px;border-radius:3px;background:#e4e4e4;margin-top:4px;overflow:hidden}
 .bar i{display:block;height:100%;border-radius:3px}
 .amt{white-space:nowrap;font-weight:600}
 .neg{color:var(--red)} .pos{color:var(--green)} .mut{color:var(--mut);font-size:12px}
 .pill{border-radius:99px;padding:1px 8px;color:#fff;font-size:11px;font-weight:700}
 #passbox{margin:40px 12px;text-align:center}
 #passbox input{font-size:17px;text-align:center;width:220px;padding:9px;border:1px solid #ccc;border-radius:8px}
 #passbox button{display:block;margin:14px auto;background:var(--cyan);color:#fff;border:0;border-radius:8px;padding:10px 26px;font-size:15px}
 #err{color:var(--red);font-size:13px;min-height:18px;margin-top:8px}
 #stamp{text-align:center;padding:8px}
</style></head><body>

const ENC=true;
let DATA=null, monthKeys=[], idx=0;
const nok=v=>Math.abs(v).toLocaleString('no-NO',{maximumFractionDigits:0});
function boot(){
 if(!ENC){ // plain snapshot — no passphrase step
  const raw=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
  DATA=JSON.parse(new TextDecoder().decode(raw));
  show();return;
 }
 const saved=localStorage.snapPass;
 if(saved){unlock(saved);} else {document.getElementById('passbox').style.display='';}
}
function show(){
 monthKeys=Object.keys(DATA.months); idx=monthKeys.length-1;
 document.getElementById('passbox').style.display='none';
 document.getElementById('app').style.display='';
 document.getElementById('stamp').textContent='Snapshot from '+DATA.generated;
 render();
}
async function unlock(saved){
 const pass=saved!=null?saved:document.getElementById('pass').value;
 try{
  const raw=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
   {name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},base,
   {name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  DATA=JSON.parse(new TextDecoder().decode(pt));
  if(saved==null && document.getElementById('rem').checked) localStorage.snapPass=pass;
  show();
 }catch(e){
  if(saved!=null){ // stale remembered passphrase — fall back to asking
   delete localStorage.snapPass;
   document.getElementById('passbox').style.display='';
  } else {
   document.getElementById('err').textContent='Wrong passphrase (or damaged file).';
  }
 }
}
function nav(d){if(!DATA)return; idx=Math.min(Math.max(idx+d,0),monthKeys.length-1); render();}
function toggle(i){const el=document.getElementById('bp'+i);
 if(el)el.style.display=el.style.display==='none'?'':'none';}
function payeeBars(list){
 if(!list||!list.length)return '<div class="mut" style="padding:4px 0 2px 8px">No payee data</div>';
 const max=Math.max(...list.map(x=>x.amount));
 return list.map(x=>`<div style="padding:3px 0 0 8px;font-size:12.5px">
  <div style="display:flex;justify-content:space-between"><span>${x.label}</span><span class="amt">${nok(x.amount)}</span></div>
  <div class="bar" style="height:5px"><i style="width:${max>0?x.amount/max*100:0}%;background:#1E88E5"></i></div>
 </div>`).join('');
}
function render(){
 const mk=monthKeys[idx], d=DATA.months[mk];
 document.getElementById('month').textContent=mk;

 // summary strip
 let inc=0,out=0;
 d.categories.forEach(c=>{const a=Math.abs(c.actual); if(c.income)inc+=a; else out+=a;});
 document.getElementById('sumIn').textContent=nok(inc);
 document.getElementById('sumOut').textContent=nok(out);
 const net=inc-out, sn=document.getElementById('sumNet');
 sn.textContent=(net<0?'-':'+')+nok(net); sn.className='amt '+(net<0?'neg':'pos');

 // budget rows with tap-to-expand payee breakdown
 document.getElementById('cats').innerHTML=d.categories.map((c,i)=>{
  const a=Math.abs(c.actual),b=Math.abs(c.budgeted),p=b>0?Math.min(a/b*100,100):(a>0?100:0);
  const over=!c.income&&a>b;
  return `<div class="row" style="display:block" onclick="toggle(${i})">
   <div style="display:flex;justify-content:space-between">
    <span>${c.name}</span><span class="amt">${nok(a)} / ${nok(b)}</span></div>
   <div class="bar"><i style="width:${p}%;background:${c.income?'var(--green)':over?'var(--red)':p>80?'var(--orange)':'var(--green)'}"></i></div>
   <div id="bp${i}" style="display:none">${payeeBars(c.byPayee)}</div>
  </div>`}).join('')||'<div class="mut">No budget data</div>';

 // spending-by-category chart (expenses only, sorted, red when over)
 const exp=d.categories.filter(c=>!c.income&&Math.abs(c.actual)>0)
   .sort((x,y)=>Math.abs(y.actual)-Math.abs(x.actual));
 const cmax=exp.length?Math.abs(exp[0].actual):1;
 document.getElementById('chart').innerHTML=exp.map(c=>{
  const a=Math.abs(c.actual),over=a>Math.abs(c.budgeted);
  return `<div style="padding:3px 0;font-size:13px">
   <div style="display:flex;justify-content:space-between"><span>${c.name}</span><span class="amt">${nok(a)}</span></div>
   <div class="bar" style="height:9px"><i style="width:${a/cmax*100}%;background:${over?'var(--red)':'var(--green)'}"></i></div>
  </div>`}).join('')||'<div class="mut">No spending yet</div>';
 document.getElementById('bills').innerHTML=d.bills.map(b=>
  `<div class="row"><span>${b.date.slice(8)}. ${b.name}</span>
   <span><span class="pill" style="background:${b.paid?'var(--green)':'var(--red)'}">${b.paid?'paid':'due'}</span>
   <span class="amt"> ${nok(b.amount)}</span></span></div>`).join('')||'<div class="mut">No bills this month</div>';
 document.getElementById('pending').textContent=d.pending>0?`(${d.pending} pending in Import)`:'';
 document.getElementById('txns').innerHTML=d.expenses.map(t=>
  `<div class="row"><span>${t.date.slice(8)}. ${t.payee||t.desc}<br><span class="mut">${t.category}</span></span>
   <span class="amt ${t.amount<0?'neg':'pos'}">${t.amount<0?'-':'+'}${nok(t.amount)}</span></div>`).join('')
  ||'<div class="mut">No processed expenses</div>';
}
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')unlock(null)});
boot();
</script></body></html>
