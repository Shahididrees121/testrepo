<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dashboard</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
 :root{--bg:#0B0B0F;--card:#17171C;--card2:#1F1F26;--text:#ECECEC;--mut:#B0B0B8;
  --line:#26262E;--track:#2C2C34;--acc1:#7C4DFF;--acc2:#536DFE;
  --green:#4CD964;--red:#FF6B5E;--orange:#FFB340;--cyan:#4FC3F7}
 *{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
 body{font-family:system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
  padding-bottom:calc(76px + env(safe-area-inset-bottom))}
 #months{display:flex;gap:8px;justify-content:center;padding:14px 12px 4px}
 #months button{border:0;border-radius:99px;padding:8px 18px;font-size:14px;font-weight:600;
  background:var(--card);color:var(--mut)}
 #months button.on{background:linear-gradient(135deg,var(--acc1),var(--acc2));color:#fff}
 section{margin:12px;background:var(--card);border-radius:18px;padding:16px}
 h2{font-size:12.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
 #hero{margin:12px;border-radius:22px;padding:22px 20px;
  background:linear-gradient(135deg,var(--acc1),var(--acc2));color:#fff}
 #hero .t{font-size:13px;opacity:.85}
 #hero .n{font-size:34px;font-weight:800;letter-spacing:-.5px;margin:2px 0 12px}
 #hero .sub{display:flex;gap:26px;font-size:13.5px}
 #hero .sub b{display:block;font-size:16px;margin-top:1px}
 .row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14.5px}
 .row:last-child{border:0}
 .chip{flex:none;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:15px;color:#fff}
 .grow{flex:1;min-width:0}
 .grow .s{color:var(--mut);font-size:12px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
 .amt{white-space:nowrap;font-weight:700;font-size:14.5px}
 .neg{color:var(--red)} .pos{color:var(--green)} .mut{color:var(--mut);font-size:12.5px}
 .bar{height:7px;border-radius:4px;background:var(--track);margin-top:6px;overflow:hidden}
 .bar i{display:block;height:100%;border-radius:4px}
 .pill{border-radius:99px;padding:2px 9px;color:#fff;font-size:11px;font-weight:700}
 #pie{width:180px;height:180px;border-radius:50%;margin:8px auto 12px}
 .lg{display:flex;justify-content:space-between;gap:8px;font-size:13px;padding:4px 0;color:var(--text)}
 .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:7px;vertical-align:-1px}
 nav{position:fixed;left:0;right:0;bottom:0;display:flex;background:rgba(23,23,28,.96);
  backdrop-filter:blur(10px);border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
 nav button{flex:1;background:none;border:0;color:var(--mut);font-size:13px;font-weight:700;
  padding:14px 0 12px;border-top:2px solid transparent}
 nav button.on{color:#fff;border-top-color:var(--acc1)}
 .tab{display:none}.tab.on{display:block}
 #stamp{text-align:center;padding:2px 0 0;color:var(--mut);font-size:12px}
 #passbox{margin:80px 16px;text-align:center}
 #passbox .lock{width:64px;height:64px;border-radius:50%;margin:0 auto 18px;display:flex;
  align-items:center;justify-content:center;font-size:26px;
  background:linear-gradient(135deg,var(--acc1),var(--acc2))}
 #passbox p{color:var(--mut);margin-bottom:16px;font-size:14px}
 #passbox input{font-size:17px;text-align:center;width:230px;padding:11px;border:1px solid var(--line);
  border-radius:12px;background:var(--card);color:var(--text)}
 #passbox label{color:var(--mut);font-size:13px}
 #passbox .go{display:block;margin:16px auto;border:0;border-radius:12px;padding:12px 34px;
  font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--acc1),var(--acc2))}
 #err{color:var(--red);font-size:13px;min-height:18px;margin-top:8px}
 svg{display:block}
</style></head><body>
<div id="passbox" style="display:none">
 <div class="lock">&#128274;</div>
 <p>This dashboard is encrypted.<br>Enter your passphrase to unlock it on this device.</p>
 <input id="pass" type="password" autocomplete="off">
 <p style="margin-top:12px"><label><input type="checkbox" id="rem" checked> Remember on this phone</label></p>
 <button class="go" onclick="unlock(null)">Unlock</button>
 <div id="err"></div></div>
<div id="app" style="display:none">
 <div id="months"></div>
 <div id="fetchwrap" style="display:none;text-align:center;padding:2px 12px 0">
  <button id="fetchbtn" onclick="fetchNow()"
   style="border:0;border-radius:99px;padding:9px 22px;font-size:14px;font-weight:700;color:#fff;
   background:linear-gradient(135deg,var(--acc1),var(--acc2))">&#8635; Fetch now</button>
  <div id="fetchmsg" class="mut" style="margin-top:5px;min-height:16px"></div>
 </div>
 <div id="stamp"></div>

 <div id="tab-budget" class="tab on">
  <div id="hero">
   <div class="t">Net this month</div>
   <div class="n" id="heroNet"></div>
   <div class="sub">
    <span>Income<b id="heroIn"></b></span>
    <span>Expenses<b id="heroOut"></b></span>
    <span id="heroPendWrap" style="display:none">Pending<b id="heroPend"></b></span>
   </div>
  </div>
  <section><h2>Budget <span class="mut" style="text-transform:none">&middot; tap a category for details</span></h2>
   <div id="cats"></div></section>
 </div>

 <div id="tab-spending" class="tab">
  <section><h2>Spend through the month</h2><div id="spark"></div></section>
  <section><h2>Share of spending</h2><div id="pie"></div><div id="pielegend"></div></section>
  <section><h2>By category vs budget</h2><div id="chart"></div></section>
 </div>

 <div id="tab-bills" class="tab">
  <section><h2>Bills</h2><div id="bills"></div></section>
 </div>

 <div id="tab-exp" class="tab">
  <section><h2>Expenses</h2><div id="txns"></div></section>
 </div>

 <nav>
  <button id="nb-budget" class="on" onclick="showTab('budget')">Budget</button>
  <button id="nb-spending" onclick="showTab('spending')">Spending</button>
  <button id="nb-bills" onclick="showTab('bills')">Bills</button>
  <button id="nb-exp" onclick="showTab('exp')">Expenses</button>
 </nav>
</div>

 '#9575CD','#4DB6AC','#FFD54F','#A1887F','#90A4AE','#81C784','#64B5F6','#BA68C8'];
let DATA=null, monthKeys=[], idx=0;
const nok=v=>Math.abs(v).toLocaleString('no-NO',{maximumFractionDigits:0});

function boot(){
 if(!ENC){
  const raw=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
  DATA=JSON.parse(new TextDecoder().decode(raw));
  show();return;
 }
 const saved=localStorage.snapPass;
 if(saved){unlock(saved);} else {document.getElementById('passbox').style.display='';}
}
function show(){
 monthKeys=Object.keys(DATA.months); idx=monthKeys.length-1;
 document.getElementById('passbox').style.display='none';
 document.getElementById('app').style.display='';
 stamp(); buildMonths(); render();
 if(MQTT) initMqtt();
}
function initMqtt(){
 try{
  document.getElementById('fetchwrap').style.display='';
  const url='wss://'+MHOST+':8884/mqtt';
  mqttClient=mqtt.connect(url,{username:MUSER,password:MPASS,
   clientId:'phone_'+Math.random().toString(16).slice(2)});
  mqttClient.on('connect',()=>setFetchMsg(''));
  mqttClient.on('error',e=>setFetchMsg('Trigger offline'));
 }catch(e){document.getElementById('fetchwrap').style.display='none';}
}
function setFetchMsg(t){document.getElementById('fetchmsg').textContent=t;}
function fetchNow(){
 if(!mqttClient||!mqttClient.connected){setFetchMsg('Trigger not connected');return;}
 // remember how fresh we are now; we'll poll until "generated" advances
 genAtRequest=DATA.generated;
 mqttClient.publish('budget/'+MTOKEN+'/fetch', JSON.stringify({t:MTOKEN,at:Date.now()}));
 setFetchMsg('Fetching from bank… (updates automatically)');
 document.getElementById('fetchbtn').disabled=true;
 fetchDeadline=Date.now()+120000; // give up after 2 min
 clearInterval(fetchPollTimer);
 fetchPollTimer=setInterval(pollFresh,15000);
 setTimeout(pollFresh,8000); // first check sooner
}
async function pollFresh(){
 if(Date.now()>fetchDeadline){
  clearInterval(fetchPollTimer);
  setFetchMsg('Still working — pull to refresh in a moment.');
  document.getElementById('fetchbtn').disabled=false;
  return;
 }
 try{
  // cache-bust so we actually get the freshly published file, not a cached copy
  const r=await fetch(location.pathname+'?t='+Date.now(),{cache:'no-store'});
  const html=await r.text();
  const m=html.match(/const PAYLOAD="([^"]*)"/);
  if(!m)return;
  // decrypt just enough to read the generated stamp
  const ng=await peekGenerated(m[1]);
  if(ng && ng!==genAtRequest){
   clearInterval(fetchPollTimer);
   // reload the whole page to pick up the new payload cleanly
   location.reload();
  }
 }catch(e){/* transient; keep polling */}
}
async function peekGenerated(payloadB64){

  const raw=Uint8Array.from(atob(payloadB64),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},
   base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt)).generated;
 }catch(e){return null;}
}
async function unlock(saved){
 const pass=saved!=null?saved:document.getElementById('pass').value;
 try{
  const raw=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
   {name:'PBKDF2',salt,iterations:210000,hash:'SHA-256'},base,
   {name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  DATA=JSON.parse(new TextDecoder().decode(pt));
  if(saved==null && document.getElementById('rem').checked) localStorage.snapPass=pass;
  show();
 }catch(e){
  if(saved!=null){delete localStorage.snapPass;
   document.getElementById('passbox').style.display='';}
  else{document.getElementById('err').textContent='Wrong passphrase (or damaged file).';}
 }
}
function stamp(){
 // "generated" is dd.MM.yyyy HH:mm — show age, and color when stale so an
 // outdated snapshot announces itself instead of quietly looking current
 const el=document.getElementById('stamp');
 const m=DATA.generated.match(/(\d+)\.(\d+)\.(\d+) (\d+):(\d+)/);
 if(!m){el.textContent='Updated '+DATA.generated;return;}
 const gen=new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]);
 const mins=Math.floor((Date.now()-gen)/60000);
 let txt, color='var(--mut)';
 if(mins<60)            txt='Updated '+Math.max(mins,0)+' min ago';
 else if(mins<60*24)    txt='Updated '+Math.floor(mins/60)+' h ago';
 else{
  const days=Math.floor(mins/(60*24));
  txt='Updated '+days+' day'+(days>1?'s':'')+' ago ('+DATA.generated+')';
  color=days>=3?'var(--red)':'var(--orange)';
 }
 el.textContent=txt;
 el.style.color=color;
}
function buildMonths(){
 document.getElementById('months').innerHTML=monthKeys.map((k,i)=>
  `<button id="m${i}" class="${i===idx?'on':''}" onclick="pick(${i})">${k}</button>`).join('');
}
function pick(i){idx=i;buildMonths();render();}
function showTab(name){
 for(const t of ['budget','spending','bills','exp']){
  document.getElementById('tab-'+t).classList.toggle('on',t===name);
  document.getElementById('nb-'+t).classList.toggle('on',t===name);
 }
 scrollTo(0,0);
}
function toggle(i){const el=document.getElementById('bp'+i);
 if(el)el.style.display=el.style.display==='none'?'':'none';}
// Level 2: payees within a tapped category. Each payee row is itself
// tappable (level 3) to reveal that payee's individual transactions.
function catPayees(catName, ci){
 const mk=monthKeys[idx], d=DATA.months[mk];
 const rows=d.expenses.filter(t=>t.catTop===catName);
 if(!rows.length)return '<div class="mut" style="padding:4px 0 2px 8px">No transactions</div>';
 // group by payee (fall back to description when no payee)
 const groups={};
 rows.forEach(t=>{const k=t.payee||t.desc||'?';(groups[k]=groups[k]||[]).push(t);});
 const names=Object.keys(groups).sort((a,b)=>
   Math.abs(sum(groups[b]))-Math.abs(sum(groups[a])));
 const max=Math.max(...names.map(n=>Math.abs(sum(groups[n]))),1);
 return '<div style="margin-top:6px;border-top:1px solid var(--line);padding-top:4px">'
  + names.map((n,pi)=>{
   const tot=Math.abs(sum(groups[n])); const pid='pt'+ci+'_'+pi;
   const txns=groups[n].map(t=>
    `<div style="display:flex;justify-content:space-between;padding:3px 0 0 20px;font-size:12px">
      <span class="mut">${t.date.slice(8)}.${t.date.slice(5,7)} ${t.desc||''}</span>
      <span class="amt ${t.amount<0?'neg':'pos'}">${t.amount<0?'−':'+'}${nok(t.amount)}</span></div>`).join('');
   return `<div style="padding:5px 0 0 8px" onclick="event.stopPropagation();togglePayee('${pid}')">
     <div style="display:flex;justify-content:space-between;font-size:13px">
      <span>${n} <span class="mut">(${groups[n].length})</span></span><span class="amt">${nok(tot)}</span></div>
     <div class="bar" style="height:5px"><i style="width:${tot/max*100}%;background:var(--cyan)"></i></div>
     <div id="${pid}" style="display:none">${txns}</div>
    </div>`;
  }).join('') + '</div>';
}
function sum(list){return list.reduce((a,t)=>a+t.amount,0);}
function togglePayee(id){const el=document.getElementById(id);
 if(el)el.style.display=el.style.display==='none'?'':'none';}
function sparkline(expenses){
 // cumulative spend per day, SVG area with gradient — no libraries
 const days={};
 expenses.forEach(t=>{if(t.amount<0){const d=+t.date.slice(8);days[d]=(days[d]||0)-t.amount;}});
 const last=Math.max(31,...Object.keys(days).map(Number));
 let acc=0;const pts=[];
 for(let d=1;d<=last;d++){acc+=days[d]||0;pts.push(acc);}
 const max=Math.max(acc,1), W=300, H=80;
 const xy=pts.map((v,i)=>`${(i/(pts.length-1)*W).toFixed(1)},${(H-6-v/max*(H-14)).toFixed(1)}`);
 return `<svg viewBox="0 0 ${W} ${H+8}" width="100%" preserveAspectRatio="none">
  <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
   <stop offset="0" stop-color="#7C4DFF" stop-opacity=".55"/>
   <stop offset="1" stop-color="#7C4DFF" stop-opacity="0"/></linearGradient></defs>
  <path d="M0,${H} L${xy.join(' L')} L${W},${H} Z" fill="url(#g)"/>
  <path d="M${xy.join(' L')}" fill="none" stroke="#9C7DFF" stroke-width="2.5"/>
 </svg><div class="mut" style="text-align:right">total ${nok(acc)} NOK</div>`;
}
function render(){
 const mk=monthKeys[idx], d=DATA.months[mk];

 let inc=0,out=0;
 d.categories.forEach(c=>{const a=Math.abs(c.actual); if(c.income)inc+=a; else out+=a;});
 const net=inc-out;
 document.getElementById('heroNet').textContent=(net<0?'−':'+')+nok(net)+' kr';
 document.getElementById('heroIn').textContent=nok(inc);
 document.getElementById('heroOut').textContent=nok(out);
 document.getElementById('heroPendWrap').style.display=d.pending>0?'':'none';
 document.getElementById('heroPend').textContent=d.pending;

 document.getElementById('cats').innerHTML=d.categories.map((c,i)=>{
  const a=Math.abs(c.actual),b=Math.abs(c.budgeted),p=b>0?Math.min(a/b*100,100):(a>0?100:0);
  const over=!c.income&&a>b;
  return `<div class="row" style="display:block" onclick="toggle(${i})">
   <div style="display:flex;justify-content:space-between">
    <span>${c.name}</span><span class="amt">${nok(a)} / ${nok(b)}</span></div>
   <div class="bar"><i style="width:${p}%;background:${c.income?'var(--green)':over?'var(--red)':p>80?'var(--orange)':'var(--green)'}"></i></div>
   <div id="bp${i}" style="display:none">${catPayees(c.name, i)}</div>
  </div>`}).join('')||'<div class="mut">No budget data</div>';

 document.getElementById('spark').innerHTML=sparkline(d.expenses);

 const pexp=d.categories.filter(c=>!c.income&&Math.abs(c.actual)>0)
   .sort((x,y)=>Math.abs(y.actual)-Math.abs(x.actual));
 const ptotal=pexp.reduce((a,c)=>a+Math.abs(c.actual),0);
 if(ptotal>0){
  let acc=0;const stops=pexp.map((c,i)=>{
   const from=acc/ptotal*360;acc+=Math.abs(c.actual);const to=acc/ptotal*360;
   return `${COLORS[i%COLORS.length]} ${from.toFixed(1)}deg ${to.toFixed(1)}deg`;});
  document.getElementById('pie').style.background=`conic-gradient(${stops.join(',')})`;
  document.getElementById('pie').style.display='';
  document.getElementById('pielegend').innerHTML=pexp.map((c,i)=>{
   const a=Math.abs(c.actual),b=Math.abs(c.budgeted);
   const share=(a/ptotal*100).toFixed(0);
   const ofBudget=b>0?(a/b*100).toFixed(0)+'% of budget':'no budget set';
   return `<div class="lg"><span><span class="dot" style="background:${COLORS[i%COLORS.length]}"></span>${c.name}</span>
    <span class="mut">${share}% · ${ofBudget}</span></div>`;}).join('');
 } else {
  document.getElementById('pie').style.display='none';
  document.getElementById('pielegend').innerHTML='<div class="mut">No spending yet</div>';
 }

 const exp=pexp, cmax=exp.length?Math.abs(exp[0].actual):1;
 document.getElementById('chart').innerHTML=exp.map(c=>{
  const a=Math.abs(c.actual),over=a>Math.abs(c.budgeted);
  return `<div style="padding:4px 0;font-size:13.5px">
   <div style="display:flex;justify-content:space-between"><span>${c.name}</span><span class="amt">${nok(a)}</span></div>
   <div class="bar" style="height:9px"><i style="width:${a/cmax*100}%;background:${over?'var(--red)':'var(--green)'}"></i></div>
  </div>`}).join('')||'<div class="mut">No spending yet</div>';

 document.getElementById('bills').innerHTML=d.bills.map(b=>
  `<div class="row">
   <span class="chip" style="background:${hue(b.name)}">${(b.name||'?')[0].toUpperCase()}</span>
   <span class="grow">${b.name}<div class="s">due ${b.date.slice(8)}.${b.date.slice(5,7)}</div></span>
   <span><span class="pill" style="background:${b.paid?'var(--green)':'var(--red)'}">${b.paid?'paid':'due'}</span>
   <span class="amt"> ${nok(b.amount)}</span></span></div>`).join('')||'<div class="mut">No bills this month</div>';

 document.getElementById('txns').innerHTML=d.expenses.map(t=>{
  const who=t.payee||t.desc||'?';
  return `<div class="row">
   <span class="chip" style="background:${hue(who)}">${who[0].toUpperCase()}</span>
   <span class="grow">${who}<div class="s">${t.date.slice(8)}.${t.date.slice(5,7)} · ${t.category||''}</div></span>
   <span class="amt ${t.amount<0?'neg':'pos'}">${t.amount<0?'−':'+'}${nok(t.amount)}</span></div>`}).join('')
  ||'<div class="mut">No processed expenses</div>';
}
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')unlock(null)});
boot();
</script></body></html>
